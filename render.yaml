services:
  - type: web
    name: emotype-studio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn emotion_rec.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: MODEL_NAME_OR_PATH
        value: Wav2vec-2.0
      - key: LLM_API_HOST
        value: api.chatanywhere.tech
      - key: LLM_MODEL
        value: gpt-4o
      - key: LLM_API_KEY
        sync: false
