services:
  - type: web
    name: emomirror
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: MODEL_NAME_OR_PATH
        value: /app/Wav2vec-2.0
      - key: TEXT_EMOTION_BACKEND
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
