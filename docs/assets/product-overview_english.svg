<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">EmoBridge Product Value Overview</title>
  <desc id="desc">A product overview showing how EmoBridge supports emotional awareness and expression through a loop of expression, perception, calibration, recording, and reflection.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCFCFF"/>
      <stop offset="0.5" stop-color="#FFF8FB"/>
      <stop offset="1" stop-color="#F5FCF9"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#536FD0"/>
      <stop offset="0.48" stop-color="#8064C5"/>
      <stop offset="1" stop-color="#C06C98"/>
    </linearGradient>
    <linearGradient id="journey" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DDE8FF"/>
      <stop offset="0.34" stop-color="#E8E0FF"/>
      <stop offset="0.68" stop-color="#F8DDE9"/>
      <stop offset="1" stop-color="#DDF2E9"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#59647B" flood-opacity="0.13"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#647087" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8067BE"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#458E77"/>
    </marker>
    <style>
      .font { font-family: Inter, Arial, "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
      .title { font-size: 38px; font-weight: 700; fill: #28344B; }
      .subtitle { font-size: 17px; font-weight: 450; fill: #737D91; }
      .panel-kicker { font-size: 14px; font-weight: 700; letter-spacing: 1.1px; }
      .panel-title { font-size: 24px; font-weight: 700; fill: #2C3850; }
      .card-title { font-size: 14px; font-weight: 700; fill: #303D55; }
      .card-text { font-size: 11px; font-weight: 500; fill: #68748A; }
      .small { font-size: 10px; font-weight: 500; fill: #68748A; }
      .chip { font-size: 12px; font-weight: 650; fill: #354158; }
      .journey-step { font-size: 8.5px; font-weight: 700; fill: #344158; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="url(#bg)"/>
  <circle cx="1520" cy="90" r="180" fill="#E8E1FF" opacity="0.45"/>
  <circle cx="85" cy="950" r="220" fill="#DFF4EB" opacity="0.42"/>
  <path d="M 0 210 C 310 115, 500 275, 810 180 C 1100 92, 1280 242, 1600 145 L 1600 0 L 0 0 Z" fill="#EEF3FF" opacity="0.48"/>

  <g class="font">
    <rect x="52" y="42" width="10" height="72" rx="5" fill="url(#hero)"/>
    <text x="82" y="76" class="title">EmoBridge</text>
    <text x="296" y="76" class="title">Product Value</text>
    <text x="535" y="76" class="title">Overview</text>
    <text x="82" y="107" class="subtitle">Move from “what happened” to seeing, naming, and expressing “how I feel”</text>

    <!-- Left: audience and pain -->
    <g filter="url(#shadow)">
      <rect x="60" y="160" width="340" height="620" rx="30" fill="#FFFFFF" stroke="#DDE4F1" stroke-width="1.6"/>
    </g>
    <text x="92" y="202" class="panel-kicker" fill="#5570C5">AUDIENCE &amp; NEEDS</text>
    <text x="92" y="239" class="panel-title">Who is EmoBridge for?</text>

    <g>
      <rect x="92" y="267" width="276" height="52" rx="16" fill="#EEF3FF"/>
      <circle cx="116" cy="293" r="9" fill="#5A76CA"/>
      <text x="137" y="299" class="chip">Emotion naming</text>

      <rect x="92" y="331" width="276" height="52" rx="16" fill="#F2EEFF"/>
      <circle cx="116" cy="357" r="9" fill="#8064BF"/>
      <text x="137" y="363" class="chip">Expression support</text>

      <rect x="92" y="395" width="276" height="52" rx="16" fill="#FFF1F6"/>
      <circle cx="116" cy="421" r="9" fill="#C56F96"/>
      <text x="137" y="427" class="chip">Long-term self-tracking</text>

      <rect x="92" y="459" width="276" height="52" rx="16" fill="#EEF9F5"/>
      <circle cx="116" cy="485" r="9" fill="#48957B"/>
      <text x="137" y="491" class="chip">HCI research</text>
    </g>

    <line x1="92" y1="540" x2="368" y2="540" stroke="#E3E7EF" stroke-width="1.5"/>
    <text x="92" y="577" class="panel-kicker" fill="#B56688">CORE PAIN POINTS</text>

    <g>
      <circle cx="104" cy="611" r="4.5" fill="#C17494"/>
      <text x="120" y="616" class="card-text">Hear words, miss the emotion</text>
      <circle cx="104" cy="650" r="4.5" fill="#C17494"/>
      <text x="120" y="655" class="card-text">Feel distress, struggle to express</text>
      <circle cx="104" cy="689" r="4.5" fill="#C17494"/>
      <text x="120" y="694" class="card-text">One-off results lack context</text>
      <circle cx="104" cy="728" r="4.5" fill="#C17494"/>
      <text x="120" y="733" class="card-text">Machine labels need calibration</text>
    </g>

    <!-- Center: product core -->
    <path d="M 400 465 L 458 465" fill="none" stroke="#8067BE" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="429" y="448" text-anchor="middle" class="small">Enter</text>

    <g filter="url(#shadow)">
      <rect x="470" y="230" width="660" height="440" rx="36" fill="#FFFFFF" stroke="#DAD9EC" stroke-width="1.7"/>
    </g>

    <rect x="565" y="265" width="470" height="112" rx="28" fill="url(#hero)"/>
    <text x="800" y="307" text-anchor="middle" font-size="30" font-weight="780" fill="#FFFFFF">EmoBridge</text>
    <text x="800" y="342" text-anchor="middle" font-size="18" font-weight="600" fill="#F8F7FF">From Information Access to Emotional Access</text>
    <text x="800" y="365" text-anchor="middle" font-size="13" font-weight="500" fill="#EEEAFE">Multimodal emotional understanding and expression support</text>

    <!-- Four product capability cards -->
    <g filter="url(#softShadow)">
      <rect x="505" y="410" width="285" height="105" rx="22" fill="#EEF3FF" stroke="#D1DDF7"/>
      <rect x="810" y="410" width="285" height="105" rx="22" fill="#F3EEFF" stroke="#DDD4F2"/>
      <rect x="505" y="535" width="285" height="105" rx="22" fill="#FFF1F6" stroke="#F0D5E0"/>
      <rect x="810" y="535" width="285" height="105" rx="22" fill="#EEF9F5" stroke="#D1EADF"/>
    </g>

    <circle cx="538" cy="443" r="15" fill="#5B77CD"/>
    <text x="538" y="449" text-anchor="middle" font-size="13" font-weight="750" fill="#FFFFFF">1</text>
    <text x="567" y="449" class="card-title">Multimodal Input</text>
    <text x="538" y="478" class="card-text">Text · Speech · Image</text>
    <text x="538" y="500" class="small">Body · Journal · Dialogue</text>

    <circle cx="843" cy="443" r="15" fill="#8266C2"/>
    <text x="843" y="449" text-anchor="middle" font-size="13" font-weight="750" fill="#FFFFFF">2</text>
    <text x="872" y="449" class="card-title">Emotion Insight</text>
    <text x="843" y="478" class="card-text">Vocabulary · V-A</text>
    <text x="843" y="500" class="small">Text-image comparison</text>

    <circle cx="538" cy="568" r="15" fill="#C26E94"/>
    <text x="538" y="574" text-anchor="middle" font-size="13" font-weight="750" fill="#FFFFFF">3</text>
    <text x="567" y="574" class="card-title">Perceive &amp; Calibrate</text>
    <text x="538" y="603" class="card-text">Kinetic type · Labels</text>
    <text x="538" y="625" class="small">User-adjusted V-A</text>

    <circle cx="843" cy="568" r="15" fill="#49977D"/>
    <text x="843" y="574" text-anchor="middle" font-size="13" font-weight="750" fill="#FFFFFF">4</text>
    <text x="872" y="574" class="card-title">Records &amp; Support</text>
    <text x="843" y="603" class="card-text">Journal · Review · History</text>
    <text x="843" y="625" class="small">Emo Echo</text>

    <!-- Right: values -->
    <path d="M 1130 465 L 1188 465" fill="none" stroke="#458E77" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <text x="1159" y="448" text-anchor="middle" class="small">Creates</text>

    <g filter="url(#shadow)">
      <rect x="1200" y="160" width="340" height="620" rx="30" fill="#FFFFFF" stroke="#DCE8E2" stroke-width="1.6"/>
    </g>
    <text x="1232" y="202" class="panel-kicker" fill="#3E8B73">USER VALUE</text>
    <text x="1232" y="239" font-size="21" font-weight="700" fill="#2C3850">From Feeling to Expression</text>

    <g>
      <rect x="1232" y="272" width="276" height="66" rx="18" fill="#EEF3FF"/>
      <rect x="1248" y="288" width="34" height="34" rx="11" fill="#5A76CA"/>
      <text x="1265" y="311" text-anchor="middle" font-size="15" font-weight="750" fill="#FFFFFF">01</text>
      <text x="1295" y="299" class="card-title">See Emotional Cues</text>
      <text x="1295" y="321" class="small">Beyond words alone</text>

      <rect x="1232" y="351" width="276" height="66" rx="18" fill="#F2EEFF"/>
      <rect x="1248" y="367" width="34" height="34" rx="11" fill="#8064BF"/>
      <text x="1265" y="390" text-anchor="middle" font-size="15" font-weight="750" fill="#FFFFFF">02</text>
      <text x="1295" y="378" class="card-title">Gain Emotion Vocabulary</text>
      <text x="1295" y="400" class="small">Name ambiguous feelings</text>

      <rect x="1232" y="430" width="276" height="66" rx="18" fill="#FFF1F6"/>
      <rect x="1248" y="446" width="34" height="34" rx="11" fill="#C56F96"/>
      <text x="1265" y="469" text-anchor="middle" font-size="15" font-weight="750" fill="#FFFFFF">03</text>
      <text x="1295" y="457" class="card-title">Express Real Feelings</text>
      <text x="1295" y="479" class="small">Preserve user corrections</text>

      <rect x="1232" y="509" width="276" height="66" rx="18" fill="#EEF9F5"/>
      <rect x="1248" y="525" width="34" height="34" rx="11" fill="#48957B"/>
      <text x="1265" y="548" text-anchor="middle" font-size="15" font-weight="750" fill="#FFFFFF">04</text>
      <text x="1295" y="536" class="card-title">Continuous Record</text>
      <text x="1295" y="558" class="small">Track change and context</text>

      <rect x="1232" y="588" width="276" height="66" rx="18" fill="#FFF8EA"/>
      <rect x="1248" y="604" width="34" height="34" rx="11" fill="#B98B42"/>
      <text x="1265" y="627" text-anchor="middle" font-size="15" font-weight="750" fill="#FFFFFF">05</text>
      <text x="1295" y="615" class="card-title">Reflect &amp; Communicate</text>
      <text x="1295" y="637" class="small">Improve emotional access</text>
    </g>

    <line x1="1232" y1="686" x2="1508" y2="686" stroke="#E1E8E4" stroke-width="1.5"/>
    <text x="1232" y="718" class="panel-kicker" fill="#7B8291">PRODUCT BOUNDARY</text>
    <text x="1232" y="739" font-size="14" font-weight="500" fill="#68748A">Not a medical diagnosis</text>
    <text x="1232" y="765" font-size="14" font-weight="500" fill="#68748A">Does not replace counseling</text>

    <!-- Product positioning ribbon -->
    <g filter="url(#softShadow)">
      <rect x="470" y="695" width="660" height="85" rx="24" fill="#FFFFFF" stroke="#E0DCEF"/>
    </g>
    <text x="505" y="726" class="panel-kicker" fill="#7560B3">PRODUCT POSITIONING</text>
    <text x="505" y="749" font-size="13" font-weight="700" fill="#303D55">Emotion-aware expression tool · Emotional accessibility support</text>
    <text x="505" y="773" font-size="11" font-weight="500" fill="#68748A">Multimodal emotion journal · HCI / Affective Computing prototype</text>

    <!-- Journey loop -->
    <text x="70" y="835" class="panel-kicker" fill="#65728A">USER VALUE LOOP</text>
    <rect x="60" y="856" width="1480" height="142" rx="32" fill="#FFFFFF" stroke="#DFE4ED" stroke-width="1.6" filter="url(#softShadow)"/>
    <rect x="92" y="886" width="1416" height="80" rx="40" fill="url(#journey)" opacity="0.7"/>

    <g>
      <circle cx="170" cy="926" r="30" fill="#FFFFFF" stroke="#6982D0" stroke-width="3"/>
      <text x="170" y="932" text-anchor="middle" class="journey-step" style="font-size:8px">Express</text>

      <path d="M 202 926 L 310 926" stroke="#8067BE" stroke-width="3" marker-end="url(#arrow)"/>
      <circle cx="350" cy="926" r="30" fill="#FFFFFF" stroke="#7880CD" stroke-width="3"/>
      <text x="350" y="932" text-anchor="middle" class="journey-step">Sense</text>

      <path d="M 382 926 L 490 926" stroke="#8067BE" stroke-width="3" marker-end="url(#arrow)"/>
      <circle cx="530" cy="926" r="30" fill="#FFFFFF" stroke="#8D72C7" stroke-width="3"/>
      <text x="530" y="932" text-anchor="middle" font-size="9" font-weight="700" fill="#344158">Visualize</text>

      <path d="M 562 926 L 670 926" stroke="#8067BE" stroke-width="3" marker-end="url(#arrow)"/>
      <circle cx="710" cy="926" r="30" fill="#FFFFFF" stroke="#B475A2" stroke-width="3"/>
      <text x="710" y="932" text-anchor="middle" class="journey-step">Adjust</text>

      <path d="M 742 926 L 850 926" stroke="#8067BE" stroke-width="3" marker-end="url(#arrow)"/>
      <circle cx="890" cy="926" r="30" fill="#FFFFFF" stroke="#C27B9C" stroke-width="3"/>
      <text x="890" y="932" text-anchor="middle" class="journey-step">Record</text>

      <path d="M 922 926 L 1030 926" stroke="#6C9A8B" stroke-width="3" marker-end="url(#arrowGreen)"/>
      <circle cx="1070" cy="926" r="30" fill="#FFFFFF" stroke="#5B9B84" stroke-width="3"/>
      <text x="1070" y="932" text-anchor="middle" class="journey-step">Review</text>

      <path d="M 1102 926 L 1210 926" stroke="#458E77" stroke-width="3" marker-end="url(#arrowGreen)"/>
      <circle cx="1260" cy="926" r="34" fill="#4B927A"/>
      <text x="1260" y="932" text-anchor="middle" font-size="9" font-weight="730" fill="#FFFFFF">Re-express</text>

      <path d="M 1296 926 C 1370 926, 1410 960, 1410 997 C 1410 1020, 1370 1027, 1310 1027 L 180 1027 C 110 1027, 92 997, 92 958 C 92 934, 112 926, 136 926" fill="none" stroke="#7890C8" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
    </g>
  </g>
</svg>
