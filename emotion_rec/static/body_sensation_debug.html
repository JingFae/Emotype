<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body Sensation Debug</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #172033;
    }
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }
    .card {
      background: #fff;
      border: 1px solid #e4e7ee;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(20, 28, 44, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .hint {
      color: #667085;
      line-height: 1.6;
      font-size: 14px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      color: #344054;
      font-size: 14px;
    }
    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      background: #fff;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 12px;
    }
    button {
      border: 1px solid #d0d5dd;
      background: #fff;
      border-radius: 999px;
      padding: 9px 13px;
      cursor: pointer;
      font-size: 14px;
    }
    button.selected {
      background: #1d2939;
      color: #fff;
      border-color: #1d2939;
    }
    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
    }
    button.secondary {
      border-radius: 12px;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .output {
      white-space: pre-wrap;
      background: #0b1020;
      color: #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
      max-height: 520px;
      font-family: Consolas, monospace;
      font-size: 13px;
    }
    .pill {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #243b80;
      font-size: 13px;
    }
    .advice-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .summary {
      color: #344054;
      line-height: 1.7;
      margin-bottom: 10px;
    }
    li {
      margin: 7px 0;
      line-height: 1.6;
    }
    .warn {
      background: #fff7ed;
      border-color: #fed7aa;
    }
    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="card">
      <h1>Body Sensation Debug</h1>
      <div class="hint">
        This is a temporary debug page for POST /body-sensation/advice.
        It does not modify the original Home / Journal UI.
      </div>
      <div class="hint">
        Open normal app: <a href="/">http://127.0.0.1:8000</a>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>1. Basic Input</h2>

        <label>Participant Code</label>
        <input id="participantCode" value="P1234" />

        <label>Journal Text</label>
        <textarea id="journalText">我今天起床晚了，午饭吃得很少，下午高强度学习之后有点头晕。</textarea>

        <label>Free Text / Extra Context</label>
        <textarea id="freeText">今天喝水也比较少。</textarea>

        <div class="row">
          <div style="flex: 1;">
            <label>Severity</label>
            <select id="severity">
              <option value="1">1 - mild</option>
              <option value="2">2</option>
              <option value="3" selected>3 - medium</option>
              <option value="4">4</option>
              <option value="5">5 - severe</option>
            </select>
          </div>
          <div style="flex: 1;">
            <label>Duration</label>
            <input id="duration" value="下午开始" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>2. Select Region</h2>
        <div id="regionButtons" class="buttons"></div>

        <h2>3. Select Symptom</h2>
        <div id="symptomButtons" class="buttons"></div>

        <div class="card" style="box-shadow:none; background:#f8fafc;">
          <h2>Selected</h2>
          <div id="selectedView" class="hint"></div>
        </div>

        <div class="row">
          <button class="primary" onclick="submitAdvice()">Generate Advice</button>
          <button class="secondary" onclick="resetSelection()">Reset</button>
        </div>
      </section>
    </div>

    <section id="renderedCard" class="card" style="display:none;">
      <h2>Rendered Advice</h2>
      <div id="renderedAdvice"></div>
    </section>

    <section class="card">
      <h2>Raw JSON</h2>
      <div id="rawOutput" class="output">Waiting...</div>
    </section>
  </main>

  <script>
    const regions = [
      {
            "id": "head",
            "label": "头部"
      },
      {
            "id": "eyes",
            "label": "眼部"
      },
      {
            "id": "ears",
            "label": "耳部"
      },
      {
            "id": "nose_sinus",
            "label": "鼻腔/鼻窦"
      },
      {
            "id": "mouth_jaw",
            "label": "口腔/下颌"
      },
      {
            "id": "throat",
            "label": "咽喉"
      },
      {
            "id": "chest",
            "label": "胸口/呼吸"
      },
      {
            "id": "heart",
            "label": "心跳/心前区"
      },
      {
            "id": "shoulder_neck",
            "label": "肩颈"
      },
      {
            "id": "upper_back",
            "label": "上背部"
      },
      {
            "id": "lower_back",
            "label": "腰背"
      },
      {
            "id": "stomach",
            "label": "胃部/上腹"
      },
      {
            "id": "abdomen",
            "label": "腹部/肠胃"
      },
      {
            "id": "lower_abdomen_pelvis",
            "label": "下腹/盆腔"
      },
      {
            "id": "skin",
            "label": "皮肤"
      },
      {
            "id": "hands",
            "label": "手部"
      },
      {
            "id": "legs",
            "label": "腿部"
      },
      {
            "id": "whole_body",
            "label": "全身"
      }
];

    const symptoms = [
      {
            "id": "headache",
            "label": "头疼"
      },
      {
            "id": "dizziness",
            "label": "头晕"
      },
      {
            "id": "brain_fog",
            "label": "脑雾/注意力涣散"
      },
      {
            "id": "eye_strain",
            "label": "眼疲劳"
      },
      {
            "id": "blurred_vision",
            "label": "视物模糊"
      },
      {
            "id": "dry_eyes",
            "label": "眼干"
      },
      {
            "id": "ear_ringing",
            "label": "耳鸣"
      },
      {
            "id": "nasal_congestion",
            "label": "鼻塞"
      },
      {
            "id": "jaw_tension",
            "label": "下颌紧绷/咬牙"
      },
      {
            "id": "throat_tightness",
            "label": "喉咙紧"
      },
      {
            "id": "dry_throat",
            "label": "嗓子干"
      },
      {
            "id": "chest_tightness",
            "label": "胸闷"
      },
      {
            "id": "palpitation",
            "label": "心跳过快/心慌"
      },
      {
            "id": "shortness_of_breath",
            "label": "呼吸困难/气短"
      },
      {
            "id": "stomach_cramp",
            "label": "胃痉挛/胃痛"
      },
      {
            "id": "acid_reflux",
            "label": "反酸/烧心"
      },
      {
            "id": "appetite_loss",
            "label": "食欲下降"
      },
      {
            "id": "nausea",
            "label": "恶心"
      },
      {
            "id": "diarrhea",
            "label": "腹泻"
      },
      {
            "id": "constipation",
            "label": "便秘"
      },
      {
            "id": "bloating",
            "label": "腹胀"
      },
      {
            "id": "lower_abdominal_cramp",
            "label": "下腹痛/小腹坠胀"
      },
      {
            "id": "menstrual_cramps",
            "label": "经期腹痛/周期相关不适"
      },
      {
            "id": "muscle_tension",
            "label": "肌肉紧绷"
      },
      {
            "id": "back_pain",
            "label": "背痛/腰酸"
      },
      {
            "id": "hand_shaking",
            "label": "手抖"
      },
      {
            "id": "cold_hands_feet",
            "label": "手脚冰凉"
      },
      {
            "id": "numbness",
            "label": "麻木"
      },
      {
            "id": "sweating",
            "label": "出汗/冷汗"
      },
      {
            "id": "fatigue",
            "label": "疲惫/乏力"
      },
      {
            "id": "sleepiness",
            "label": "困倦"
      },
      {
            "id": "insomnia",
            "label": "失眠/入睡困难"
      },
      {
            "id": "restlessness",
            "label": "坐立不安"
      },
      {
            "id": "skin_itching",
            "label": "皮肤瘙痒"
      }
];

    let selectedRegion = regions[0];
    let selectedSymptom = symptoms[1];

    function renderButtons() {
      const regionBox = document.getElementById("regionButtons");
      const symptomBox = document.getElementById("symptomButtons");

      regionBox.innerHTML = "";
      symptomBox.innerHTML = "";

      regions.forEach(region => {
        const btn = document.createElement("button");
        btn.textContent = region.label + " / " + region.id;
        btn.className = selectedRegion.id === region.id ? "selected" : "";
        btn.onclick = () => {
          selectedRegion = region;
          renderButtons();
        };
        regionBox.appendChild(btn);
      });

      symptoms.forEach(symptom => {
        const btn = document.createElement("button");
        btn.textContent = symptom.label + " / " + symptom.id;
        btn.className = selectedSymptom.id === symptom.id ? "selected" : "";
        btn.onclick = () => {
          selectedSymptom = symptom;
          renderButtons();
        };
        symptomBox.appendChild(btn);
      });

      document.getElementById("selectedView").innerHTML = `
        <span class="pill">Region: ${selectedRegion.label} (${selectedRegion.id})</span>
        <span class="pill">Symptom: ${selectedSymptom.label} (${selectedSymptom.id})</span>
      `;
    }

    function resetSelection() {
      selectedRegion = regions[0];
      selectedSymptom = symptoms[1];
      document.getElementById("journalText").value = "我今天起床晚了，午饭吃得很少，下午高强度学习之后有点头晕。";
      document.getElementById("freeText").value = "今天喝水也比较少。";
      document.getElementById("severity").value = "3";
      document.getElementById("duration").value = "下午开始";
      document.getElementById("rawOutput").textContent = "Waiting...";
      document.getElementById("renderedCard").style.display = "none";
      renderButtons();
    }

    function renderAdvice(data) {
      const box = document.getElementById("renderedAdvice");
      const card = document.getElementById("renderedCard");
      const advice = data.advice || {};
      const safety = data.safety || {};
      const context = data.emotion_context || {};

      const riskClass = safety.risk_level === "high" ? "card warn" : "";
      const steps = Array.isArray(advice.steps) ? advice.steps : [];
      const links = Array.isArray(data.possible_links) ? data.possible_links : [];
      const redFlags = Array.isArray(safety.red_flags) ? safety.red_flags : [];

      box.innerHTML = `
        <div class="${riskClass}">
          <div class="advice-title">${advice.title || "No title"}</div>
          <div class="summary">${advice.summary || ""}</div>

          <div class="hint">
            Emotion: ${context.primary_label || "-"} |
            Quadrant: ${context.quadrant || "-"} |
            Advice source: ${(advice.source || "-")}
          </div>

          <h3>Possible Links</h3>
          <ul>
            ${links.map(item => `<li><b>${item.label || item.type || ""}</b>: ${item.description || ""}</li>`).join("")}
          </ul>

          <h3>Steps</h3>
          <ol>
            ${steps.map(step => `<li>${step}</li>`).join("")}
          </ol>

          <h3>Reflection Prompt</h3>
          <div class="summary">${advice.reflection_prompt || ""}</div>

          ${redFlags.length ? `
            <h3>Safety Red Flags</h3>
            <ul>${redFlags.map(flag => `<li>${flag}</li>`).join("")}</ul>
          ` : ""}

          <div class="hint">Not medical diagnosis: ${advice.not_medical_diagnosis ? "true" : "false"}</div>
        </div>
      `;

      card.style.display = "block";
    }

    async function submitAdvice() {
      const payload = {
        participant_code: document.getElementById("participantCode").value.trim(),
        journal_text: document.getElementById("journalText").value.trim(),
        selected_regions: [
          { id: selectedRegion.id, label: selectedRegion.label }
        ],
        symptoms: [
          {
            region_id: selectedRegion.id,
            label: selectedSymptom.label,
            severity: Number(document.getElementById("severity").value),
            duration: document.getElementById("duration").value.trim()
          }
        ],
        free_text: document.getElementById("freeText").value.trim(),
        include_recent_diaries: true,
        recent_diary_limit: 3
      };

      document.getElementById("rawOutput").textContent = "Loading...";
      document.getElementById("renderedCard").style.display = "none";

      try {
        const response = await fetch("/body-sensation/advice", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        document.getElementById("rawOutput").textContent = JSON.stringify(data, null, 2);
        renderAdvice(data);
      } catch (error) {
        document.getElementById("rawOutput").textContent = String(error && error.stack ? error.stack : error);
      }
    }

    renderButtons();
  </script>
</body>
</html>
