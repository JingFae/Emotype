<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>身体感受 | EmoBridge</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260605" />
  <link rel="stylesheet" href="/static/body_sensation.css?v=body_v2" />
</head>
<body class="body-sensation-page">
<main class="app-shell body-page-shell">
  <header class="topbar body-topbar">
    <a class="brand-mark" href="/" aria-label="EmoBridge 首页">
      <img class="brand-icon2" src="/static/icon2-only.png" alt="" aria-hidden="true" />
      <img class="brand-name-img" src="/static/name-text.png" alt="emobridge" />
    </a>

    <nav class="view-tabs" aria-label="Primary navigation">
      <a class="tab-button" href="/">首页</a>
      <a class="tab-button" href="/#journalView">随手记</a>
      <a class="tab-button" href="/diary">日记本</a>
      <a class="tab-button" href="/review">情绪复盘</a>
      <a class="tab-button is-active" href="/body-sensation" aria-current="page">身体感受</a>
    </nav>

    <div class="topbar-right body-session">
      <span class="body-session-label">Body Sense</span>
      <span class="status-pill" id="bodyParticipantBadge">local</span>
    </div>
  </header>

  <section class="body-heading" aria-labelledby="bodyTitle">
    <div>
      <p class="eyebrow">Emotion & Body</p>
      <h1 id="bodyTitle">身体感受</h1>
      <p>选择身体部位和感受，系统会结合最近记录生成温和、非诊断式的缓解提示。</p>
    </div>
    <div class="body-heading-actions">
      <label class="body-participant-control" for="bodyParticipantCode">
        <span>实验编号</span>
        <input id="bodyParticipantCode" type="text" autocomplete="off" placeholder="local 或 P001" />
      </label>
      <button class="warm-btn ghost" type="button" id="bodyRefreshContextBtn">读取最近记录</button>
    </div>
  </section>

  <section class="body-page-layout" aria-label="身体感受工作区">
    <aside class="body-figure-panel" aria-labelledby="bodyFigureTitle">
      <div class="body-panel-head">
        <div>
          <p class="eyebrow">Body Map</p>
          <h2 id="bodyFigureTitle">身体部位</h2>
        </div>
        <span class="body-state-pill" id="bodyPairCount">0 组</span>
      </div>
      <div class="body-figure-wrap">
        <img src="/static/people.svg" alt="身体部位示意图" />
      </div>
      <section class="body-selected-panel" aria-labelledby="selectedPairsTitle">
        <div class="panel-label" id="selectedPairsTitle">已选组合</div>
        <div class="body-selected-pairs-v2" id="bodySelectedPairs">暂无</div>
      </section>
    </aside>

    <section class="body-input-column" aria-labelledby="bodyInputTitle">
      <div class="body-card">
        <div class="body-panel-head compact">
          <div>
            <p class="eyebrow">Context</p>
            <h2 id="bodyInputTitle">当前记录参考</h2>
          </div>
          <span class="body-state-pill" id="bodyContextState">未读取</span>
        </div>
        <textarea id="bodyJournalText" placeholder="可以粘贴今天的随手记、正式日记片段，或留空让系统只根据本次身体感受生成建议。"></textarea>
        <div class="body-context-list" id="bodyRecentContext"></div>
      </div>

      <div class="body-card">
        <div class="body-panel-head compact">
          <div>
            <p class="eyebrow">Region</p>
            <h2>选择部位</h2>
          </div>
        </div>
        <div class="body-chip-grid" id="bodyRegionChips"></div>
      </div>

      <div class="body-card">
        <div class="body-panel-head compact">
          <div>
            <p class="eyebrow">Sensation</p>
            <h2>选择感受</h2>
          </div>
        </div>
        <div class="body-chip-grid" id="bodySymptomChips"></div>
      </div>

      <div class="body-card">
        <div class="body-detail-grid">
          <label class="body-range-control" for="bodySeverity">
            <span>程度</span>
            <input id="bodySeverity" type="range" min="1" max="5" value="3" />
            <strong id="bodySeverityLabel">3 / 5</strong>
          </label>
          <label class="body-text-control" for="bodyDuration">
            <span>持续时间</span>
            <input id="bodyDuration" type="text" value="下午开始" autocomplete="off" />
          </label>
        </div>
        <label class="body-text-control body-free-text" for="bodyFreeText">
          <span>补充描述</span>
          <textarea id="bodyFreeText" placeholder="例如：今天喝水较少、久坐、睡眠不足，或某个时段更明显。"></textarea>
        </label>
        <div class="body-actions">
          <button class="warm-btn ghost" type="button" id="bodyAddPairBtn">加入组合</button>
          <button class="warm-btn ghost" type="button" id="bodyClearPairsBtn">清空</button>
          <button class="warm-btn red" type="button" id="bodySubmitBtn">生成身体感受建议</button>
        </div>
        <p class="body-submit-status" id="bodySubmitStatus">系统会综合身体感受和最近记录。</p>
      </div>
    </section>

    <aside class="body-advice-column">
      <article class="body-advice-card" id="bodyAdviceCard" aria-labelledby="bodyAdviceTitle">
        <div class="body-panel-head">
          <div>
            <p class="eyebrow">Advice</p>
            <h2 id="bodyAdviceTitle">建议展示</h2>
          </div>
          <span class="body-state-pill" id="bodyAdviceState">待生成</span>
        </div>
        <div class="body-advice-empty" id="bodyAdviceEmpty">
          <p>选择至少一个身体感受组合后生成建议。建议会保持温和、非诊断式，并保留必要的就医提醒。</p>
        </div>
        <div class="body-advice-content" id="bodyAdviceContent"></div>
      </article>
    </aside>
  </section>
</main>
<script src="/static/body_sensation.js?v=body_v2" defer></script>
</body>
</html>
