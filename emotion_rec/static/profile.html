<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人信息 | EmoBridge</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260607a" />
  <link rel="stylesheet" href="/static/profile.css?v=20260607a" />
</head>
<body>

<main class="app-shell profile-shell">

  <!-- Topbar -->
  <header class="topbar">
    <a class="brand-mark" href="/">
      <img class="brand-icon2" src="/static/icon2-only.png" alt="" aria-hidden="true" />
      <img class="brand-name-img" src="/static/name-text.png" alt="emobridge" />
    </a>
    <nav class="view-tabs" aria-label="Primary navigation">
      <a class="tab-button" href="/" data-i18n="nav.home">首页</a>
      <a class="tab-button" href="/essay" data-i18n="nav.essay">情绪随笔</a>
      <a class="tab-button" href="/body-sensation" data-i18n="nav.body">身体感受</a>
      <a class="tab-button" href="/emo-echo" data-i18n="nav.ecoEcho">Emo 回响</a>
      <a class="tab-button" href="/historyreview" data-i18n="nav.historyReview">历史回顾</a>
      <a class="tab-button is-active" href="/profile" aria-current="page" id="profileTab" data-i18n="nav.profile">个人信息</a>
      <a class="tab-button" href="/login" id="authTab" data-i18n="nav.login">登录</a>
    </nav>
    <div class="topbar-right">
    </div>
  </header>

  <!-- Heading -->
  <section class="profile-heading">
    <div>
      <p class="eyebrow" data-i18n="profile.eyebrow">My Profile</p>
      <h1 data-i18n="profile.title">个人信息</h1>
    </div>
  </section>

  <!-- User info card -->
  <section class="warm-card profile-info-card" id="profileInfoCard">
    <div class="profile-avatar" id="profileAvatar">?</div>
    <div class="profile-details">
      <h2 id="profileDisplayName">--</h2>
      <p class="profile-meta" id="profileMeta">@-- · 注册于 --</p>
      <div class="profile-role-badge">
        <span class="status-pill" id="profileRole">用户</span>
      </div>
    </div>
  </section>

  <!-- Settings card -->
  <section class="warm-card profile-settings-card">
    <div class="section-head">
      <div>
        <p class="eyebrow" data-i18n="profile.settingsEyebrow">Settings</p>
        <h2 data-i18n="profile.settingsTitle">账户设置</h2>
      </div>
    </div>
    <form id="profileSettingsForm">
      <label class="participant-code-control">
        <span data-i18n="profile.displayName">显示名</span>
        <input type="text" id="settingsDisplayName" data-i18n-placeholder="profile.displayNamePh" placeholder="修改显示名" autocomplete="name" />
      </label>
      <label class="participant-code-control">
        <span data-i18n="profile.currentPw">当前密码</span>
        <input type="password" id="settingsCurrentPassword" data-i18n-placeholder="profile.currentPwPh" placeholder="输入当前密码以修改" autocomplete="current-password" />
      </label>
      <label class="participant-code-control">
        <span data-i18n="profile.newPw">新密码</span>
        <input type="password" id="settingsNewPassword" data-i18n-placeholder="profile.newPwPh" placeholder="输入新密码（至少4位）" autocomplete="new-password" />
      </label>
      <button class="warm-btn primary" type="submit" data-i18n="profile.save">保存修改</button>
    </form>
    <p class="profile-status" id="settingsStatus"></p>
    <!-- 偏好设置（即时生效，不需要保存按钮） -->
    <div class="profile-preferences">
      <label class="participant-code-control">
        <span data-i18n="profile.lang">语言偏好</span>
        <select id="settingsLang">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <label class="participant-code-control privacy-toggle-setting">
        <input type="checkbox" id="settingsLocalMode" />
        <span data-i18n="profile.localMode">本地模式</span>
        <small data-i18n="profile.localModeHint" style="color:var(--muted);font-size:12px;margin-top:2px;">仅保存在本地浏览器，不同步到服务器</small>
      </label>
    </div>
  </section>

  <!-- Quick links card -->
  <section class="warm-card profile-links-card">
    <div class="section-head">
      <div>
        <p class="eyebrow" data-i18n="profile.quickEyebrow">Quick Access</p>
        <h2 data-i18n="profile.quickTitle">我的数据</h2>
      </div>
    </div>
    <div class="profile-link-grid">
      <a class="warm-btn ghost" href="/emo-echo">Emo 回响</a>
      <a class="warm-btn ghost" href="/records" data-i18n="nav.records">历史记录</a>
      <a class="warm-btn ghost" href="/review" data-i18n="nav.review">情绪复盘</a>
      <a class="warm-btn ghost" href="/diary" data-i18n="nav.diaryBook">日记本</a>
      <a class="warm-btn ghost" href="/body-sensation" data-i18n="nav.body">身体感受</a>
    </div>
  </section>

  <!-- Admin section (hidden for non-admin users) -->
  <section class="warm-card profile-admin-card" id="adminSection" style="display:none">
    <div class="section-head">
      <div>
        <p class="eyebrow" data-i18n="profile.adminEyebrow">Admin</p>
        <h2 data-i18n="profile.adminTitle">用户管理</h2>
      </div>
    </div>
    <table class="admin-user-table">
      <thead>
        <tr>
          <th data-i18n="profile.thUsername">用户名</th>
          <th data-i18n="profile.thDisplay">显示名</th>
          <th data-i18n="profile.thRole">角色</th>
          <th data-i18n="profile.thCreated">注册时间</th>
          <th data-i18n="profile.thLastLogin">最后登录</th>
          <th data-i18n="profile.thActions">操作</th>
        </tr>
      </thead>
      <tbody id="adminUsersBody">
        <tr><td colspan="6">加载中...</td></tr>
      </tbody>
    </table>
    <!-- Admin record viewer -->
    <div id="adminRecordView" class="admin-record-view" style="display:none">
      <div class="admin-record-header">
        <h3 id="adminRecordTitle">用户记录</h3>
        <button class="warm-btn ghost" type="button" id="adminRecordClose" data-i18n="profile.close">关闭</button>
      </div>
      <table class="admin-user-table">
        <thead>
          <tr>
            <th data-i18n="profile.thSource">来源</th>
            <th data-i18n="profile.thDate">日期</th>
            <th data-i18n="profile.thSummary">内容摘要</th>
          </tr>
        </thead>
        <tbody id="adminRecordList">
          <tr><td colspan="3">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script src="/static/i18n.js?v=20260607a"></script>
<script src="/static/auth.js?v=20260607a"></script>
<script src="/static/profile.js?v=20260607a" defer></script>
</body>
</html>
